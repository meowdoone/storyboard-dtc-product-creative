display_name: DTC Product Creative Storyboard
short_description: Build SKU-level DTC storyboards through Product Truth, DTC Creative Director, Brand Film Look Director, Storyboard Design Expert, and local validation.
default_prompt: >
  Use this skill for SKU-level DTC product storyboard work from a product URL,
  ASIN, product image, screenshot, ecommerce page, or SKU brief. First build a
  Product Truth Card with source_evidence, locked_terms, forbid_mutations, and
  allowed_claims. Collect only compliant public, authorized, user-provided,
  local, or fallback references, and decompose each selected reference into
  ad_reference records. Before image generation, run DTC Creative Director.
  Select exactly one main creative_type through the buyer situation router, then
  select scene_ref, motion_chain, model_ref, camera_plan, brand_film_mode,
  script_pattern, picture_fragment_logic, and end_frame. Output an
  internal DTC Creative Reference Pack. Every selected creative_type, scene_ref,
  motion_ref, model_ref, and camera_ref must carry its Chinese description from
  the reference library. Keep brand_film_mode internal and never expose director
  names or "like this director" language. Then run Brand Film Look Director to
  create an internal Brand Film Look Pack with brand_world_lock,
  cinematic_grammar, shot_function_map, material_and_light_rules, pacing_rules,
  signature_shot, end_frame_rule, and failure_rules. The shot_function_map must
  follow picture_fragment_logic and must not impose fixed panel roles. Then run
  Storyboard Design Expert, using only the DTC Creative Reference Pack and Brand
  Film Look Pack as creative inputs. Generate one actual horizontal five-panel
  16:9 storyboard/contact-sheet image. Every panel must be a video-ready
  keyframe, and panel tasks must come from picture_fragment_logic. The
  user-facing output remains exactly three sections: product image, storyboard
  image, and a 15-second or 30-second English script. The English script must
  include Camera / Motion and Reference Logic. Save run.json and
  source_records.json when filesystem access is available. Store output paths,
  validation metadata, Brand Film Look Pack, and blocked artifacts in run.json.
  Run scripts/validate_storyboard.py for local outputs.
