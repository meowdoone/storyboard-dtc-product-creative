display_name: DTC Product Creative Storyboard
short_description: Build SKU-level DTC storyboards through Product Truth, DTC Creative Director, Reference Pack, Storyboard Design Expert, and local validation.
default_prompt: >
  Use this skill for SKU-level DTC product storyboard work from a product URL,
  ASIN, product image, screenshot, ecommerce page, or SKU brief. First build a
  Product Truth Card with source_evidence, locked_terms, forbid_mutations, and
  allowed_claims. Collect only compliant public, authorized, user-provided,
  local, or fallback references, and decompose each selected reference into
  ad_reference records. Before image generation, run DTC Creative Director.
  Select exactly one main creative_type, then select scene_ref, motion_chain,
  model_ref, camera_plan, script_pattern, and picture_fragment_logic. Output an
  internal DTC Creative Reference Pack. Then run Storyboard Design Expert, using
  only that pack as the creative input. Generate one actual horizontal
  five-panel 16:9 storyboard/contact-sheet image. Every panel must be a
  video-ready keyframe, and panel 3 must be the strongest product proof. The
  user-facing output remains exactly three sections: product image, storyboard
  image, and a 15-second or 30-second English script. The English script must
  include Camera / Motion and Reference Logic. Save run.json and
  source_records.json when filesystem access is available. Run
  scripts/validate_storyboard.py for local outputs. Store validation metadata in
  run.json. Stop instead of returning a text-only storyboard if image generation
  or image embedding is unavailable.
