<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">DTC 商品创意故事版 Skill 内容流程图</title>
  <desc id="desc">展示从商品证据到内容属性卡、内容策略、五格故事版、英文脚本和交付检查的流程。</desc>
  <defs>
    <style>
      .bg { fill: #f6f3ee; }
      .title { font: 700 38px "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1c1a17; }
      .subtitle { font: 400 18px "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #5c554d; }
      .label { font: 700 20px "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #181612; }
      .small { font: 400 15px "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #4d4740; }
      .tiny { font: 400 13px "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #5d554d; }
      .mono { font: 700 14px "SFMono-Regular", Consolas, monospace; fill: #2e2a26; }
      .card { fill: #ffffff; stroke: #d7cfc4; stroke-width: 1.5; rx: 18; }
      .gate { fill: #fff7e8; stroke: #c5913f; stroke-width: 2; rx: 18; }
      .strategy { fill: #eef5ff; stroke: #7fa1c8; stroke-width: 1.6; rx: 18; }
      .story { fill: #f3f7ed; stroke: #8aa263; stroke-width: 1.6; rx: 16; }
      .qa { fill: #f7eef2; stroke: #ba7d93; stroke-width: 1.6; rx: 18; }
      .pill { fill: #1f4e5f; rx: 18; }
      .pillText { font: 700 14px "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #665d53; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #9b9187; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowMuted); }
      .warn { fill: #8f3d2e; font: 700 16px "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#665d53"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9b9187"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900"/>

  <text class="title" x="70" y="72">DTC 商品创意故事版 Skill</text>
  <text class="subtitle" x="70" y="108">目标：把真实 SKU 证据转成商品主导、有内容属性、可执行的 5 格故事版和英文短视频脚本</text>

  <rect class="pill" x="70" y="135" width="256" height="36"/>
  <text class="pillText" x="92" y="158">商品真相 &gt; 内容属性 &gt; 创意镜头</text>

  <rect class="gate" x="70" y="205" width="260" height="168"/>
  <text class="label" x="95" y="240">1. 证据锁定</text>
  <text class="small" x="95" y="276">商品图 / 商品页 / SKU brief</text>
  <text class="small" x="95" y="304">锁定类型、形状、颜色、材质</text>
  <text class="small" x="95" y="332">包装、比例、使用方式、声明</text>
  <text class="warn" x="95" y="360">证据不足：停止，不进故事版</text>

  <rect class="card" x="390" y="185" width="300" height="208"/>
  <text class="label" x="418" y="222">2. Content Attribute Card</text>
  <text class="small" x="418" y="258">target_buyer / buyer_stage</text>
  <text class="small" x="418" y="286">content_angle / hook_type</text>
  <text class="small" x="418" y="314">core_message / product_promise</text>
  <text class="small" x="418" y="342">reason_to_believe / objection</text>
  <text class="small" x="418" y="370">proof_asset / CTA intent</text>

  <rect class="strategy" x="750" y="185" width="300" height="208"/>
  <text class="label" x="778" y="222">3. 内容策略选择</text>
  <text class="small" x="778" y="258">shopper_tension</text>
  <text class="small" x="778" y="286">buyer_event：真实动作或时刻</text>
  <text class="small" x="778" y="314">creative_lens 服务内容角度</text>
  <text class="small" x="778" y="342">product_entrance 在第 1/2 格</text>
  <text class="small" x="778" y="370">visual_device 组织 5 格</text>

  <rect class="card" x="1110" y="185" width="220" height="208"/>
  <text class="label" x="1135" y="222">映射硬规则</text>
  <text class="mono" x="1135" y="260">content_angle</text>
  <text class="mono" x="1135" y="286">-&gt; hook_type</text>
  <text class="mono" x="1135" y="312">-&gt; creative_lens</text>
  <text class="mono" x="1135" y="338">-&gt; proof_asset</text>
  <text class="mono" x="1135" y="364">-&gt; CTA intent</text>

  <path class="arrow" d="M330 289 H385"/>
  <path class="arrow" d="M690 289 H745"/>
  <path class="arrow" d="M1050 289 H1105"/>

  <rect class="story" x="70" y="470" width="240" height="205"/>
  <text class="label" x="96" y="506">Panel 1</text>
  <text class="small" x="96" y="540">Hook / 商品进入</text>
  <text class="small" x="96" y="568">SKU 锚点必须清楚</text>
  <text class="tiny" x="96" y="606">画面和 0-2s 脚本</text>
  <text class="tiny" x="96" y="628">必须同时成立</text>

  <rect class="story" x="330" y="470" width="240" height="205"/>
  <text class="label" x="356" y="506">Panel 2</text>
  <text class="small" x="356" y="540">买家疑虑</text>
  <text class="small" x="356" y="568">内容角度建立</text>
  <text class="tiny" x="356" y="606">问题、选择、场景</text>
  <text class="tiny" x="356" y="628">必须可见</text>

  <rect class="story" x="590" y="470" width="240" height="205"/>
  <text class="label" x="616" y="506">Panel 3</text>
  <text class="small" x="616" y="540">商品证明</text>
  <text class="small" x="616" y="568">机制 / 材质 / 细节</text>
  <text class="tiny" x="616" y="606">至少两格证明</text>
  <text class="tiny" x="616" y="628">商品细节</text>

  <rect class="story" x="850" y="470" width="240" height="205"/>
  <text class="label" x="876" y="506">Panel 4</text>
  <text class="small" x="876" y="540">使用瞬间</text>
  <text class="small" x="876" y="568">利益点 / 消除反对点</text>
  <text class="tiny" x="876" y="606">proof_asset 必须</text>
  <text class="tiny" x="876" y="628">能被画面证明</text>

  <rect class="story" x="1110" y="470" width="240" height="205"/>
  <text class="label" x="1136" y="506">Panel 5</text>
  <text class="small" x="1136" y="540">CTA intent</text>
  <text class="small" x="1136" y="568">购买信心 / 最终状态</text>
  <text class="tiny" x="1136" y="606">不能只是漂亮收尾</text>
  <text class="tiny" x="1136" y="628">要让买家更敢下一步</text>

  <path class="arrow" d="M310 573 H325"/>
  <path class="arrow" d="M570 573 H585"/>
  <path class="arrow" d="M830 573 H845"/>
  <path class="arrow" d="M1090 573 H1105"/>
  <path class="dash" d="M900 393 C900 425 710 430 710 465"/>

  <rect class="qa" x="70" y="735" width="600" height="96"/>
  <text class="label" x="96" y="772">5. 英文脚本</text>
  <text class="small" x="96" y="806">0-2s hook + product entrance · 2-5s tension · 5-8s proof · 8-11s benefit · 11-15s CTA</text>

  <rect class="qa" x="730" y="735" width="620" height="96"/>
  <text class="label" x="756" y="772">6. 交付前 QA</text>
  <text class="small" x="756" y="806">默认只输出三段：产品图 / 故事版 / 15 秒或 30 秒英文脚本</text>

  <path class="arrow" d="M710 675 C710 710 370 700 370 730"/>
  <path class="arrow" d="M670 783 H725"/>

  <text class="tiny" x="70" y="868">硬边界：不能编造新包装、新 logo、新功效、新功能、新配件、假评论、假平台 UI；商品不是创意道具，商品是创意存在的原因。</text>
</svg>
